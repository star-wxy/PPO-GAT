seed: 42
model_variant: "scoring_gat"
env_overrides:
  robot:
    charging_enabled: false
    charge_rate: 0.0
    charging_task_rate_scale: 1.0
    idle_charge_rate_scale: 0.0
total_timesteps: 100000
learning_rate: 0.0001
n_steps: 1024
batch_size: 256
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.15
ent_coef: 0.006
vf_coef: 0.5
max_grad_norm: 0.5
n_epochs: 8
device: "auto"
checkpoint_dir: "outputs/ablation_checkpoints/mixed_context/no_charging"
tensorboard_log: "outputs/ablation_tensorboard/mixed_context/no_charging"
best_model_dir: "outputs/ablation_best_models/mixed_context/no_charging"
eval_log_path: "outputs/ablation_eval/mixed_context/no_charging"
eval_freq: 10000
n_eval_episodes: 3
model_name: "ablation_no_charging_mixed_context"

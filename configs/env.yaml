num_robots: 3
num_nodes: 4
max_steps: 100

robot:
  init_energy: 100.0

nodes:
  - type: local
    cpu_capacity: 4.0
    latency: 0.05
    energy_factor: 0.8

  - type: edge
    cpu_capacity: 8.0
    latency: 0.20
    energy_factor: 1.0

  - type: edge
    cpu_capacity: 10.0
    latency: 0.30
    energy_factor: 1.1

  - type: cloud
    cpu_capacity: 20.0
    latency: 0.80
    energy_factor: 1.5

task:
  size_min: 1.0
  size_max: 8.0
  deadline_min: 2
  deadline_max: 6
  priority_levels: 3
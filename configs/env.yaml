num_robots: 3
num_nodes: 4
max_steps: 100

robot:
  init_energy: 100.0
  local_cpu_min: 1.5
  local_cpu_max: 3.5
  task_rate_min: 0.55
  task_rate_max: 0.9
  task_size_bias_min: 0.85
  task_size_bias_max: 1.2
  deadline_bias_min: 0.85
  deadline_bias_max: 1.15

robots:
  - home_node_id: 0
    local_cpu: 3.2
    task_rate: 0.85
    task_size_bias: 0.9
    deadline_bias: 1.0
  - home_node_id: 1
    local_cpu: 2.4
    task_rate: 0.72
    task_size_bias: 1.1
    deadline_bias: 1.05
  - home_node_id: 2
    local_cpu: 1.8
    task_rate: 0.62
    task_size_bias: 1.2
    deadline_bias: 1.15

nodes:
  - type: local
    cpu_capacity: 4.0
    latency: 0.05
    energy_factor: 0.8

  - type: edge
    cpu_capacity: 8.0
    latency: 0.20
    energy_factor: 1.0

  - type: edge
    cpu_capacity: 10.0
    latency: 0.30
    energy_factor: 1.1

  - type: cloud
    cpu_capacity: 20.0
    latency: 0.80
    energy_factor: 1.5

task:
  size_min: 1.0
  size_max: 8.0
  deadline_min: 3
  deadline_max: 7
  priority_levels: 3

task_types:
  - name: navigation
    size_scale: 0.8
    deadline_scale: 0.95
    priority_bias: 0
    local_compute_scale: 0.7
    transmission_scale: 0.6
  - name: perception
    size_scale: 1.2
    deadline_scale: 1.05
    priority_bias: 1
    local_compute_scale: 1.1
    transmission_scale: 1.0
  - name: mapping
    size_scale: 1.35
    deadline_scale: 1.2
    priority_bias: 1
    local_compute_scale: 1.25
    transmission_scale: 1.15
  - name: manipulation
    size_scale: 1.0
    deadline_scale: 1.0
    priority_bias: 2
    local_compute_scale: 0.95
    transmission_scale: 0.8
